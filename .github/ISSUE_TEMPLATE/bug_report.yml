name: Bug Report
description: Report a bug or unexpected behavior
labels: bug
body:
  - type: markdown
    attributes:
      value: |
        ## Pi Inky Weather Display Bug Report
        Please limit your report to one issue per submission. Use the search function to check if the issue has already been reported.
  - type: dropdown
    id: provider
    attributes:
      label: Weather Provider
      options:
        - BOM (Bureau of Meteorology)
        - Open-Meteo
        - Both/Other
      description: Which weather data provider are you using?
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Raspberry Pi OS
        - DietPi
        - Debian
        - Ubuntu
        - Other Linux (specify below)
      description: What OS is your Raspberry Pi running?
    validations:
      required: true
  - type: input
    id: os_other
    attributes:
      label: If Other, please specify
      placeholder: e.g., Arch Linux ARM, OpenSUSE, etc.
    validations:
      required: false
  - type: dropdown
    id: device
    attributes:
      label: Device
      options:
        - Raspberry Pi Zero W
        - Raspberry Pi Zero 2 W
        - Raspberry Pi 3B
        - Raspberry Pi 3B+
        - Raspberry Pi 4B
        - Raspberry Pi 5
        - Other (specify below)
    validations:
      required: true
  - type: input
    id: device_other
    attributes:
      label: If Other, please specify
      placeholder: e.g., Raspberry Pi CM4, etc.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Application Version
      placeholder: e.g., v1.0.0, or commit hash if built from source
      description: Run `pi-inky-weather-epd --version` to check
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Configuration
      description: Please provide your config settings (remove sensitive data like API keys if any)
      placeholder: Paste relevant config.toml sections here
    validations:
      required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
      placeholder: What happened? If applicable, explain what you were trying to do when the bug occurred
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe the expected behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error Messages/Logs
      description: Please include any error messages, stack traces, or relevant logs
      placeholder: |
        Paste error messages or logs here
        If running in production, check `/var/log/syslog` or the application logs
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/Recordings
      description: If applicable, add screenshots of the issue (especially useful for display rendering bugs)
      placeholder: Attach images here
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Any other context about the problem here
      placeholder: Additional notes, workarounds, or related issues
    validations:
      required: false
