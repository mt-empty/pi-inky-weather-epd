# Deterministic test configuration, merged on top of default.toml by
# `DashboardSettings::load_test_config()`. Tests build a settings *value* from
# this base via tests/helpers/test_utils.rs (`test_settings` and friends),
# mutate it as needed (provider, render options, mock base URLs), and pass it
# into the code under test — no env vars, no globals, fully parallel.

[release]
update_interval_days = 0
allow_pre_release_version = false

[api]
provider = "open_meteo"  # Default for tests; BOM tests set this in their settings value
latitude = -37.8136
longitude = 144.9631

[misc]
timezone = "Australia/Melbourne"  # Deterministic display timezone; tests set their own where needed
weather_data_cache_path = "tests/output/cached_data/"  # Separate from fixtures to avoid overwriting test data

[render_options]
use_moon_phase_instead_of_clear_night = false
prefer_weather_codes = false
precipitation_opacity_min = 0.40
precipitation_opacity_max = 0.60

[dev]
# disable_weather_api_requests = false allows HTTP calls, which wiremock
# intercepts (tests point the provider base URLs at the mock server).
disable_weather_api_requests = false
disable_png_output = true
enable_debug_logs = false
