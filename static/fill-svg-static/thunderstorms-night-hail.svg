<!-- E-ink adapted: thunderstorm with hail (night) -->
<!-- Based on thunderstorms-night-rain.svg with rain drops replaced by hail circles -->
<!-- Moon: blue fill + black stroke -->
<!-- Cloud: cloudGradient fill + black stroke (thunderstorm severity > extreme) -->
<!-- Hail circles: white fill + blue stroke (distinguishes from blue rain drops) -->
<!-- Lightning bolt: yellow fill + black stroke -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 512 512"
>
  <defs>
    <linearGradient
      id="cloudGradient"
      x1="0"
      y1="0"
      x2="0"
      y2="1"
      gradientUnits="objectBoundingBox"
    >
      <stop offset="0" stop-color="white" />
      <stop offset=".9" stop-color="#6b7280" />
      <stop offset="1" stop-color="#4b5563" />
    </linearGradient>
    <symbol id="h" viewBox="0 0 172 172">
      <path
        fill="blue"
        stroke="black"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="4"
        d="M160.6 107.4a84.8 84.8 0 01-85.4-84.3A83.3 83.3 0 0178 2 84.7 84.7 0 002 85.7 84.8 84.8 0 0087.4 170a85.2 85.2 0 0082.6-63.1 88 88 0 01-9.4.5Z"
      />
    </symbol>
    <symbol id="i" viewBox="0 0 350 222">
      <path
        fill="url(#cloudGradient)"
        stroke="black"
        stroke-miterlimit="10"
        stroke-width="6"
        d="m291 107-2.5.1A83.9 83.9 0 00135.6 43 56 56 0 0051 91a56.6 56.6 0 00.8 9A60 60 0 0063 219l4-.2v.2h224a56 56 0 000-112Z"
      />
    </symbol>
    <symbol id="g" viewBox="0 0 363 258">
      <use xlink:href="#h" width="196" height="196" />
      <use
        xlink:href="#i"
        width="350"
        height="222"
        transform="translate(13 36)"
      />
    </symbol>
    <!-- Hail circles: 3 ice pellets, white fill + blue stroke -->
    <symbol id="j" viewBox="0 0 137 115" style="overflow:visible">
      <circle cx="0" cy="12.5" r="16" fill="white" stroke="blue" stroke-width="5" />
      <circle cx="-60" cy="42.5" r="16" fill="white" stroke="blue" stroke-width="5" />
      <circle cx="-15" cy="92.5" r="16" fill="white" stroke="blue" stroke-width="5" />
      <circle cx="100" cy="92.5" r="16" fill="white" stroke="blue" stroke-width="5" />
      <circle cx="138" cy="22.5" r="16" fill="white" stroke="blue" stroke-width="5" />
      <circle cx="185" cy="62.5" r="16" fill="white" stroke="blue" stroke-width="5" />
    </symbol>
    <symbol id="k" viewBox="0 0 102.7 186.8">
      <path
        fill="yellow"
        stroke="black"
        stroke-miterlimit="10"
        stroke-width="4"
        d="m34.8 2-32 96h32l-16 80 80-112h-48l32-64h-48z"
      />
    </symbol>
  </defs>
  <use xlink:href="#g" width="363" height="258" transform="translate(68 109)" />
  <use xlink:href="#j" width="137" height="115" transform="translate(187.5 349.5)" />
  <use
    xlink:href="#k"
    width="102.7"
    height="186.7"
    transform="translate(205.23 291)"
  />
</svg>
