<!-- E-ink adapted: overcast night with snow grains -->
<!-- Based on overcast-night-snow.svg with snowflakes replaced by small grain circles -->
<!-- Snow grains are small rounded ice pellets: white fill + blue stroke, r=8 -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 512 512"
  xmlns:xlink="http://www.w3.org/1999/xlink"
>
  <defs>
    <!-- Symbol #e (moon) -->
    <symbol id="e" viewBox="0 0 172 172">
      <path
        fill="blue"
        stroke="black"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="4"
        d="M160.6 107.4
           a84.8 84.8 0 01-85.4-84.3
           A83.3 83.3 0 0178 2
           A84.7 84.7 0 002 85.7
           A84.8 84.8 0 0087.4 170
           a85.2 85.2 0 0082.6-63.1
           a88 88 0 01-9.4.5Z"
      />
    </symbol>

    <!-- Symbol #g (smaller cloud) -->
    <symbol id="g" viewBox="0 0 210.3 126.1">
      <path
        fill="white"
        stroke="black"
        stroke-miterlimit="10"
        stroke-width="6"
        d="M.5 93.2
           a32.4 32.4 0 0032.4 32.4
           h129.8v-.1l2.3.1
           a34.8 34.8 0 006.5-68.9
           32.4 32.4 0 00-48.5-33
           48.6 48.6 0 00-88.6 37.1
           h-1.5A32.4 32.4 0 00.5 93.1Z"
      />
    </symbol>

    <!-- Symbol #h: Larger cloud -->
    <symbol id="h" viewBox="0 0 350 223">
      <path
        fill="white"
        stroke="black"
        stroke-miterlimit="10"
        stroke-width="7"
        d="m291 107-2.5.1
           A83.9 83.9 0 00135.6 43
           A56 56 0 0051 91
           a56.6 56.6 0 00.8 9
           A60 60 0 0063 219
           l4-.2v.2h224
           a56 56 0 000-112Z"
      />
    </symbol>

    <!-- Symbol #f: Combined smaller cloud (#g) + larger cloud (#h) -->
    <symbol id="f" viewBox="0 0 398 222">
      <use
        xlink:href="#g"
        width="180.3"
        height="126.1"
        transform="translate(168 27)"
      />
      <use
        xlink:href="#h"
        width="280"
        height="222"
      />
    </symbol>

    <!-- Symbol #d: Full combined shape (moon + clouds) -->
    <symbol id="d" viewBox="0 0 398.8 246">
      <use xlink:href="#e" width="172" height="172" />
      <use
        xlink:href="#f"
        width="398"
        height="222"
        transform="translate(12.84 46)"
      />
    </symbol>

    <!-- Symbol #l: Snow grains (small rounded ice pellets, white + blue stroke) -->
    <!-- Positions match the spread of snowflakes in overcast-night-snow.svg -->
    <symbol id="l" viewBox="0 0 129 110" style="overflow:visible">
      <circle cx="-32" cy="83" r="8" fill="white" stroke="blue" stroke-width="2" />
      <circle cx="18"  cy="68" r="8" fill="white" stroke="blue" stroke-width="2" />
      <circle cx="68"  cy="83" r="8" fill="white" stroke="blue" stroke-width="2" />
      <circle cx="118" cy="68" r="8" fill="white" stroke="blue" stroke-width="2" />
      <circle cx="158" cy="38" r="8" fill="white" stroke="blue" stroke-width="2" />
    </symbol>
  </defs>

  <use
    xlink:href="#d"
    width="410.8"
    height="258"
    transform="translate(56 109)"
  />

  <use
    xlink:href="#l"
    width="330"
    height="150"
    transform="translate(90 303.5)"
  />
</svg>
