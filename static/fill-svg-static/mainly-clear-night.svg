<!-- E-ink adapted: mainly clear night - large moon with a small cloud hint -->
<!-- Moon: same as clear-night.svg (large, dominant, blue fill + black stroke) -->
<!-- Cloud: small cloud at bottom-right corner, white fill + black stroke -->
<svg
  xmlns="http://www.w3.org/2000/svg"
  xmlns:xlink="http://www.w3.org/1999/xlink"
  viewBox="0 0 512 512"
>
  <defs>
    <symbol id="moon" viewBox="0 0 270 270">
      <path
        fill="blue"
        stroke="black"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="6"
        d="M252.3 168.6A133.4 133.4 0 01118 36.2
           130.5 130.5 0 01122.5 3
           133 133 0 003 134.6
           C3 207.7 63 267 137.2 267
           c62.5 0 114.8-42.2 129.8-99.2
           a135.6 135.6 0 01-14.8.8Z"
      />
    </symbol>
    <symbol id="cloud" viewBox="-5 0 360 222">
      <path
        fill="white"
        stroke="black"
        stroke-miterlimit="10"
        stroke-width="10"
        d="m291 107-2.5.1A83.9 83.9 0 00135.6 43 56 56 0 0051 91a56.6 56.6 0 00.8 9A60 60 0 0063 219l4-.2v.2h224a56 56 0 000-112Z"
      />
    </symbol>
  </defs>
  <!-- Large moon fills most of canvas, same as clear-night.svg -->
  <use xlink:href="#moon" width="270" height="270" transform="translate(121 121)" />
  <!-- Small cloud hint at bottom-right, partially overlapping moon -->
  <use xlink:href="#cloud" width="230" height="146" transform="translate(235 320)" />
</svg>
